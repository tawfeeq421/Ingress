apiVersion: v1
kind: Service
metadata:
  name: state-service
  labels:
    app: test
spec:
  ClusterIP: None
  ports:
    - targetPort: 3306
      port: 3306
  selector:
    app: test
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: ststefulset
  labels:
    app: state
spec:
  replicas: 3
  serviceName: state-service
  selector:
    matchLabels:
      app: test
  template:
    metadata:
      labels:
        app: test
    spec:
      containers:
        - name: mydb
          image: mysql
          env:
            - name: MYSQL_ROOT_PASSWORD
              value: admin123
          ports:
            - containerPort: 3306
          volumeMounts:
            - name: mysql-volume
              mountPath: /var/lib/mysql
      volumes:
        - name: mysql-volume
          persistentVolumeClaim:
            claimName: pvc-volume


