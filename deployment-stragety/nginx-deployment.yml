apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-deploymnet
  labels:
    type: test
spec:
  replicas: 2
  selector:
    matchLabels:
      app: test-app
  template:
    metadata:
      labels:
        app: test-app
    spec:
      containers:
       - name: nginx
         image: nginx:1.28
